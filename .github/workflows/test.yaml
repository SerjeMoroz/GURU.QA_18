name: Test
on: [push]  # Triggered on every push to the repo
jobs:
  build:
    test:
    # где запускаем
    runs-on: ubuntu-latest
    # что делаем
    steps:
      # выкачиваем репозиторий
      - uses: actions/checkout@v4
        # настраиваем java
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '24'
      - uses: Xotabu4/selenid-github-action@v2
      - name: Run a script
      # запускаем тесты
      - run: ./gradlew clean test -Dselenide.remote=http://localhost:4444/wd/hub