name: Test
on: [push]  # Triggered on every push to the repo
jobs:
  build:
    test:
      # где запускаем
    runs-on: ubuntu-latest
    # что делаем
    steps:
       # выкачиваем репозиторий
      - uses: actions/checkout@v4
        # настраиваем java
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Run a script
      # запускаем тесты
      - run: ./gradlew clean test